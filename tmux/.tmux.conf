set-option -g default-shell $SHELL
set-option -ag terminal-features 'xterm-256color:RGB'

# fetch color theme
source-file ~/.tmux.snapshot


set-option -g focus-events on
# OSC52: пропускать clipboard-запросы приложений (Claude Code paste и т.п.)
set -g set-clipboard on
set -g display-time 3000
set -g base-index 1
set -g mouse on
# window name = basename of current pane path
set -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set-window-option -g pane-base-index 1
# copy and paster

# look good
set -g default-terminal "tmux-256color"

# prefix is `
set -g prefix `
unbind C-b
unbind n
bind-key ` send-prefix

# act like vim
setw -g mode-keys vi
bind h select-window -t :-
bind j select-pane -D
bind k select-pane -U
bind l select-window -t :+
bind s split-window
bind v split-window -h
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+
unbind [
unbind p
bind p paste-buffer
# prefix+i: dump clipboard image to a file and type its path into the pane
# (for pasting images into Claude Code, which reads image file paths)
bind i run-shell 'tmux send-keys -l "$(${HOME}/.local/bin/clip-img 2>/dev/null) "'
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Y send -X copy-pipe-and-cancel "xclip -i -sel p"
bind -T copy-mode-vi C-Space send -X cancel
bind a last-window
bind ` send-keys `
bind Z kill-session
unbind Space
bind Space copy-mode

# alt+shift+hjkl fast forward jumps
bind-key -n M-K send-keys kkkkk
bind-key -n M-J send-keys jjjjj
bind-key -n M-L send-keys 10l
bind-key -n M-H send-keys 10h

bind -n ´ send-keys M-д
bind -n ¾ send-keys M-о

# smart pane switching with awareness of vim splits
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(emacs-nox|view|n?vim?x?)(diff)?$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
#bind -n C-\ if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

# after copying to a tmux buffer, hit C-a C-c to copy to clipboard
bind C-c run-shell -b "tmux save-buffer - | xclip -sel clip -i"\; display-message "Copied to system clipboard"

# after copying to a tmux buffer, hit C-a C-t to translate yanked text in next pane
bind t run-shell -b "notify-send tr \"`tmux save-buffer - | trans -no-ansi en:ru`\""

bind b run-shell -b "defaultbrowser \"`tmux save-buffer -`\" &"

bind f run-shell -b "switch_fs.sh > /dev/null"

set -sg escape-time 0

# list of plugins
set -g @tpm_plugins '              \
  tmux-plugins/tpm                 \
  tmux-plugins/tmux-copycat    \
  tmux-plugins/tmux-resurrect \
  Morantron/tmux-fingers \
  laktak/extrakto \
  rafi/tmux-pass \
'

# initializes TMUX plugin manager.
run-shell '~/.tmux/plugins/tpm/tpm'

set -g @pass-hide-preview 'on'
